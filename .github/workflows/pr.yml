name: PR

on:
  pull_request:

jobs:
  test_suite:
    name: Test suite
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Compile
        run: npm run compile

      - name: Run hygiene checks
        run: npm run hygiene

      - name: Run lint
        run: npm run lint

      - name: Verify command registrations
        run: npm run check:commands

      - name: Run test suite
        run: npm run test
